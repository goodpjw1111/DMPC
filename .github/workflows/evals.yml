# FREE evaluation SCHEDULER on GitHub Actions (card-free path, docs/DEPLOY.md §12).
# One scheduler tick per run (worker/scheduler.py with DMPC_SCHED_ONCE=1):
#   (1) advance contest status scheduled->live->ended
#   (2) create DUE 09:00/18:00 KST evaluation rounds (idempotent, catch-up safe)
#   (3) recover wedged rounds, then (4) GRADE due rounds in isolate -> standings.
#
# 09:00 KST = 00:00 UTC, 18:00 KST = 09:00 UTC. We also run every 15 min so status
# flips + any missed round are picked up promptly (rounds carry an as-of cutoff, so a
# late tick reproduces the on-time result exactly).

name: evals
on:
  schedule:
    - cron: "0 0,9 * * *"        # 09:00 & 18:00 KST — the eval moments
    - cron: "*/15 * * * *"       # status transitions + catch-up for any missed round
  workflow_dispatch: {}
  repository_dispatch:           # API fires this on "지금 평가 실행" (api/app/ci_dispatch.py)
    types: [evals]

permissions:
  contents: read

concurrency:
  group: evals
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configured?            # skip cheaply (stay green) until the secrets exist
        id: guard
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          EVAL_SEED_SECRET: "${{ secrets.EVAL_SEED_SECRET }}"
        run: |
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${EVAL_SEED_SECRET:-}" ]; then
            echo "DATABASE_URL / EVAL_SEED_SECRET not set yet — skipping (docs/DEPLOY.md §12-6)"
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.go == 'true'
        with: { python-version: "3.12" }

      - name: Install isolate + toolchains
        if: steps.guard.outputs.go == 'true' && vars.DMPC_UNSAFE_NO_SANDBOX != '1'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcap-dev libseccomp-dev pkg-config libsystemd-dev build-essential git
          git clone --depth 1 https://github.com/ioi/isolate /tmp/isolate
          sudo make -C /tmp/isolate install
          isolate --version
          # isolate v2 maps sandbox UIDs via /etc/subuid+/etc/subgid for its config's
          # subid_user (default "isolate"); GitHub runners lack it -> "User isolate not found
          # in /etc/subuid". Create the user + ranges so `isolate --init` passes.
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin isolate 2>/dev/null || true
          grep -q '^isolate:' /etc/subuid || echo 'isolate:100000:65536' | sudo tee -a /etc/subuid
          grep -q '^isolate:' /etc/subgid || echo 'isolate:100000:65536' | sudo tee -a /etc/subgid
          isolate --version
          # SMOKE: init + a real --run the SAME way the grader does (no --cg). Prints isolate's
          # own stderr + exit so any --run setup failure is visible right here, not buried in a round.
          echo "=== isolate smoke (no --cg) ==="
          isolate --box-id=0 --init && echo "init OK"
          set +e
          isolate --box-id=0 --run --processes=60 --mem=1048576 --time=5 --wall-time=10 -- /bin/true
          echo "isolate --run /bin/true exit=$?"
          set -e
          isolate --box-id=0 --cleanup >/dev/null 2>&1 || true

      - name: One scheduler tick (status flips + create + grade due rounds)
        if: steps.guard.outputs.go == 'true'
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          EVAL_SEED_SECRET: "${{ secrets.EVAL_SEED_SECRET }}"   # MUST equal the API's value
          DMPC_SCHED_ONCE: "1"
          DMPC_CALIBRATION_FACTOR: "1.5"
          ISOLATE_BOX_ID: "1"
          DMPC_ISOLATE_NO_CG: "1"   # GitHub runners can't delegate cgroup v2 -> run isolate w/o --cg
                                    # (namespaces still sandbox; memory via RLIMIT_AS). See sandbox.py.
          DMPC_UNSAFE_NO_SANDBOX: "${{ vars.DMPC_UNSAFE_NO_SANDBOX }}"   # TEST ONLY: set repo var=1 to skip isolate
        run: |
          pip install --no-cache-dir asyncpg
          python worker/scheduler.py
